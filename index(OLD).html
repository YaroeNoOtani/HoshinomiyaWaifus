<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Collection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --cover-dark: #1a0f23;
  --cover-deep: #2e1736;
  --page-cream: #f3ead7;
  --page-cream-2: #ece0c8;
  --ink: #2b1f33;
  --gold: #c9a04d;
  --gold-light: #e3c47e;
  --rose: #e2607a;
  --rose-deep: #b8415c;
  --silver: #9aa3ad;
  --bronze: #b5723a;
  --display: 'Fraunces', serif;
  --body: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--cover-dark);font-family:var(--body);color:var(--ink);}

#app{
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 0%, #3a1f45 0%, transparent 45%),
    radial-gradient(circle at 90% 10%, #241230 0%, transparent 50%),
    var(--cover-dark);
  padding:28px 18px 80px;
}

.binder{
  max-width:1180px;
  margin:0 auto;
  background:var(--page-cream);
  border-radius:14px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(201,160,77,.15);
  overflow:hidden;
  position:relative;
}

.binder::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:46px;
  background:repeating-linear-gradient(180deg, var(--cover-deep) 0 26px, var(--gold) 26px 30px, var(--cover-deep) 30px 56px);
  opacity:.9;
}

.cover-header{
  background:linear-gradient(135deg, var(--cover-deep), #1f1029);
  padding:38px 40px 38px 70px;
  position:relative;
  color:var(--page-cream);
  border-bottom:4px solid var(--gold);
}
.cover-header h1{
  font-family:var(--display);
  font-weight:700;
  font-size:2.6rem;
  margin:0 0 4px;
  letter-spacing:.3px;
}
.cover-header .sub{
  font-family:var(--mono);
  font-size:.78rem;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--gold-light);
  opacity:.9;
}

.tabs{
  display:flex;
  gap:6px;
  padding:14px 16px 14px 70px;
  background:var(--cover-dark);
  flex-wrap:wrap;
}
.tab-btn{
  font-family:var(--mono);
  font-size:.78rem;
  letter-spacing:1px;
  text-transform:uppercase;
  background:transparent;
  color:var(--gold-light);
  border:1px solid rgba(201,160,77,.35);
  padding:9px 16px;
  border-radius:999px;
  cursor:pointer;
  transition:.18s;
}
.tab-btn:hover{ border-color:var(--gold); background:rgba(201,160,77,.1); }
.tab-btn.active{ background:var(--gold); color:var(--cover-dark); border-color:var(--gold); font-weight:600; }

.page{ padding:32px 36px 50px 70px; }
.page.hidden{ display:none; }

/* Toolbar */
.toolbar{
  display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:24px;
}
.toolbar input[type=text], .toolbar select{
  font-family:var(--body);
  background:var(--page-cream-2);
  border:1px solid rgba(43,31,51,.2);
  padding:9px 14px;
  border-radius:8px;
  font-size:.9rem;
  color:var(--ink);
}
.toolbar input[type=text]{ flex:1; min-width:180px; }
.btn{
  font-family:var(--body);
  font-weight:600;
  font-size:.85rem;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  transition:.15s transform, .15s box-shadow;
}
.btn:active{ transform:scale(.96); }
.btn-gold{ background:var(--gold); color:var(--cover-dark); }
.btn-gold:hover{ box-shadow:0 4px 14px rgba(201,160,77,.4); }
.btn-rose{ background:var(--rose); color:#fff; }
.btn-rose:hover{ box-shadow:0 4px 14px rgba(226,96,122,.4); }
.btn-ghost{ background:transparent; border:1px solid rgba(43,31,51,.25); color:var(--ink); }
.btn-ghost.active{ background:var(--ink); color:var(--page-cream); }

/* Grid of cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
  gap:20px;
}
.empty-state{
  font-family:var(--display);
  font-style:italic;
  color:rgba(43,31,51,.55);
  text-align:center;
  padding:60px 20px;
  font-size:1.1rem;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  box-shadow:0 8px 18px -8px rgba(43,31,51,.35);
  cursor:pointer;
  transition:transform .18s ease;
  border:1px solid rgba(43,31,51,.08);
}
.card:hover{ transform:translateY(-4px); }
.card .shine{
  position:absolute; inset:0;
  background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.55) 45%, transparent 60%);
  background-size:250% 250%;
  background-position:-100% -100%;
  pointer-events:none;
  transition:background-position .6s ease;
}
.card:hover .shine{ background-position:100% 100%; }
.card-img{
  width:100%; aspect-ratio:3/4; object-fit:cover; background:var(--page-cream-2);
  display:block;
}
.card-img.placeholder{
  display:flex; align-items:center; justify-content:center;
  font-family:var(--display); font-size:2.2rem; color:rgba(43,31,51,.3);
}
.card-body{ padding:10px 12px 12px; }
.card-name{ font-family:var(--display); font-weight:600; font-size:1rem; margin:0 0 2px; line-height:1.2; }
.card-series{ font-size:.74rem; color:rgba(43,31,51,.55); margin:0 0 6px; }
.card-stars{ font-size:.85rem; color:var(--gold); letter-spacing:1px; }
.pin-btn{
  position:absolute; top:8px; right:8px;
  background:rgba(26,15,35,.55);
  border:none; border-radius:50%;
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  color:var(--page-cream); cursor:pointer; font-size:.95rem;
  z-index:2;
}
.pin-btn.is-fav{ background:var(--rose); }
.tier-badge{
  position:absolute; top:8px; left:8px;
  font-family:var(--mono); font-size:.68rem; font-weight:600;
  background:var(--cover-dark); color:var(--gold-light);
  padding:2px 7px; border-radius:5px; z-index:2;
}

/* Tags */
.tag-pills{ display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.pill{
  font-family:var(--mono); font-size:.66rem;
  background:var(--page-cream-2); color:var(--ink);
  padding:2px 8px; border-radius:999px;
}

/* Tag suggestions */
.tag-suggest-group{ margin-bottom:10px; }
.tag-suggest-group:last-child{ margin-bottom:0; }
.tag-suggest-heading{
  font-family:var(--mono); font-size:.66rem; text-transform:uppercase; letter-spacing:1px;
  color:rgba(43,31,51,.55); margin-bottom:6px;
}
.tag-chip{
  display:inline-block; font-family:var(--mono); font-size:.74rem;
  background:#fff; border:1px solid rgba(43,31,51,.2); color:var(--ink);
  padding:4px 10px; border-radius:999px; margin:0 5px 5px 0; cursor:pointer; transition:.12s;
}
.tag-chip:hover{ border-color:var(--gold); background:var(--gold-light); }
.tag-chip.added{ background:var(--ink); color:var(--page-cream); border-color:var(--ink); }

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(26,15,35,.7);
  display:flex; align-items:center; justify-content:center;
  z-index:50; padding:20px;
}
.modal-overlay.hidden{ display:none; }
.modal{
  background:var(--page-cream); border-radius:14px;
  max-width:520px; width:100%;
  max-height:88vh; overflow-y:auto;
  padding:28px 28px 24px;
  position:relative;
  border-top:5px solid var(--gold);
}
.modal h2{ font-family:var(--display); margin-top:0; }
.modal-close{
  position:absolute; top:16px; right:18px;
  background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--ink);
}
.field{ margin-bottom:14px; }
.field label{
  display:block; font-family:var(--mono); font-size:.7rem; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:5px; color:rgba(43,31,51,.7);
}
.field input, .field select, .field textarea{
  width:100%; font-family:var(--body); font-size:.92rem;
  padding:9px 12px; border-radius:8px; border:1px solid rgba(43,31,51,.2);
  background:#fff; color:var(--ink);
}
.field textarea{ min-height:70px; resize:vertical; }
.row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.star-input{ font-size:1.4rem; letter-spacing:4px; cursor:pointer; }
.star-input span{ color:rgba(43,31,51,.25); }
.star-input span.filled{ color:var(--gold); }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }

/* Detail modal */
.detail-grid{ display:grid; grid-template-columns:160px 1fr; gap:18px; }
.detail-grid img{ width:100%; border-radius:10px; aspect-ratio:3/4; object-fit:cover; }
.detail-notes{ font-size:.9rem; line-height:1.5; white-space:pre-wrap; margin-top:8px; }

/* Tier list */
.tier-row{ display:flex; align-items:stretch; margin-bottom:14px; border-radius:10px; overflow:hidden; min-height:110px; box-shadow:0 4px 10px -4px rgba(43,31,51,.25); }
.tier-label{
  width:70px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--display); font-weight:700; font-size:1.6rem; color:#fff;
}
.tier-S .tier-label{ background:var(--rose-deep); }
.tier-A .tier-label{ background:var(--gold); color:var(--cover-dark); }
.tier-B .tier-label{ background:var(--silver); color:var(--cover-dark); }
.tier-C .tier-label{ background:var(--bronze); }
.tier-Unranked .tier-label{ background:#7a6f86; font-size:.9rem; }
.tier-body{
  flex:1; background:var(--page-cream-2); display:flex; gap:10px; padding:10px; flex-wrap:wrap;
  align-content:flex-start;
}
.tier-body.dragover{ background:#e0d3b3; }
.mini-card{
  width:64px; cursor:grab; text-align:center;
}
.mini-card img{ width:64px; height:84px; object-fit:cover; border-radius:6px; box-shadow:0 3px 6px rgba(0,0,0,.25); }
.mini-card .mini-name{ font-size:.62rem; margin-top:3px; font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Compare */
.compare-wrap{ display:flex; gap:24px; justify-content:center; align-items:stretch; flex-wrap:wrap; }
.compare-card{ width:230px; text-align:center; }
.compare-card img{ width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:12px; box-shadow:0 10px 20px -8px rgba(43,31,51,.4); }
.compare-vs{ font-family:var(--display); font-size:2rem; align-self:center; color:rgba(43,31,51,.4); font-style:italic; }
.compare-name{ font-family:var(--display); font-weight:600; margin:10px 0 2px; }
.compare-score{ font-family:var(--mono); font-size:.78rem; color:rgba(43,31,51,.6); margin-bottom:10px; }

.fab{
  position:fixed; bottom:26px; right:26px;
  background:var(--rose); color:#fff; border:none;
  font-family:var(--mono); font-weight:600; font-size:.8rem; text-transform:uppercase; letter-spacing:1px;
  padding:14px 20px; border-radius:999px; cursor:pointer;
  box-shadow:0 10px 24px -6px rgba(226,96,122,.6);
  z-index:30;
}
.fab:hover{ transform:translateY(-2px); }

.spotlight-card{ text-align:center; }
.spotlight-card img{ width:220px; aspect-ratio:3/4; object-fit:cover; border-radius:14px; margin:10px auto; display:block; box-shadow:0 18px 30px -10px rgba(0,0,0,.4);}

@media (max-width:640px){
  .cover-header, .tabs, .page{ padding-left:40px; }
  .binder::before{ width:24px; }
  .detail-grid{ grid-template-columns:1fr; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div id="app">
  <div class="binder">
    <div class="cover-header">
      <h1>My Collection</h1>
      <div class="sub">a personal archive — anime · manga · games · light novels</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="collection">Collection</button>
      <button class="tab-btn" data-tab="tier">Tier List</button>
      <button class="tab-btn" data-tab="compare">Compare</button>
    </div>

    <!-- COLLECTION PAGE -->
    <div class="page" id="page-collection">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search by name or series...">
        <select id="filterSeries"><option value="">All series</option></select>
        <select id="filterTag"><option value="">All tags</option></select>
        <select id="sortSelect">
          <option value="recent">Sort: Recently added</option>
          <option value="rating">Sort: Rating (high-low)</option>
          <option value="name">Sort: Name (A-Z)</option>
        </select>
        <button class="btn btn-ghost" id="favOnlyBtn">★ Pinned only</button>
        <button class="btn btn-gold" id="openAddBtn">+ Add character</button>
      </div>
      <div class="grid" id="cardGrid"></div>
    </div>

    <!-- TIER LIST PAGE -->
    <div class="page hidden" id="page-tier">
      <p style="font-family:var(--mono);font-size:.78rem;color:rgba(43,31,51,.6);margin-top:0;">drag cards between rows to rank them</p>
      <div id="tierContainer"></div>
    </div>

    <!-- COMPARE PAGE -->
    <div class="page hidden" id="page-compare">
      <div style="text-align:center;margin-bottom:18px;">
        <button class="btn btn-gold" id="newMatchupBtn">New matchup</button>
      </div>
      <div class="compare-wrap" id="compareWrap"></div>
    </div>
  </div>
</div>

<button class="fab" id="randomBtn">🎲 Random waifu</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay hidden" id="formModalOverlay">
  <div class="modal">
    <button class="modal-close" id="formCloseBtn">&times;</button>
    <h2 id="formTitle">Add character</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>Name</label>
      <input type="text" id="fName" placeholder="e.g. Asuka Langley Soryu">
    </div>
    <div class="row2">
      <div class="field">
        <label>Series</label>
        <input type="text" id="fSeries" placeholder="e.g. Neon Genesis Evangelion">
      </div>
      <div class="field">
        <label>Source type</label>
        <select id="fSource">
          <option>Anime</option>
          <option>Manga</option>
          <option>Game</option>
          <option>Light Novel</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Image URL</label>
      <input type="text" id="fImage" placeholder="https://...">
    </div>
    <div class="field">
      <label>Tags (comma separated)</label>
      <input type="text" id="fTags" placeholder="tsundere, redhead, mecha pilot">
      <button type="button" class="btn btn-ghost" id="suggestTagsBtn" style="margin-top:8px;font-size:.75rem;padding:6px 12px;">✨ Suggest tags</button>
      <div id="tagSuggestPanel" class="hidden" style="margin-top:10px;padding:12px;background:var(--page-cream-2);border-radius:8px;"></div>
    </div>
    <div class="field">
      <label>Rating</label>
      <div class="star-input" id="starInput">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <div class="field">
      <label>Notes — why you like them, favorite quotes, episode...</label>
      <textarea id="fNotes" placeholder="..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelFormBtn">Cancel</button>
      <button class="btn btn-rose" id="deleteBtn" style="display:none;">Delete</button>
      <button class="btn btn-gold" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay hidden" id="detailModalOverlay">
  <div class="modal">
    <button class="modal-close" id="detailCloseBtn">&times;</button>
    <div class="detail-grid">
      <img id="dImage" src="" alt="">
      <div>
        <h2 id="dName" style="margin:0 0 2px;"></h2>
        <div id="dSeries" style="font-size:.85rem;color:rgba(43,31,51,.6);"></div>
        <div id="dStars" style="color:var(--gold);font-size:1.1rem;margin:6px 0;"></div>
        <div class="tag-pills" id="dTags"></div>
        <div class="detail-notes" id="dNotes"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="editFromDetailBtn">Edit</button>
    </div>
  </div>
</div>

<!-- SPOTLIGHT MODAL -->
<div class="modal-overlay hidden" id="spotlightOverlay">
  <div class="modal spotlight-card">
    <button class="modal-close" id="spotlightCloseBtn">&times;</button>
    <div style="font-family:var(--mono);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(43,31,51,.5);">today's pick</div>
    <img id="spotlightImg" src="" alt="">
    <h2 id="spotlightName" style="margin:4px 0 0;"></h2>
    <div id="spotlightSeries" style="font-size:.85rem;color:rgba(43,31,51,.6);"></div>
  </div>
</div>

<script>
(function(){
  // ====== FIREBASE SETUP ======
  // 1. Go to https://console.firebase.google.com -> Add project (free)
  // 2. In your project: Build > Realtime Database > Create Database > start in "test mode"
  // 3. Project settings (gear icon) > General > "Your apps" > Web app (</>) > copy the config below
  // 4. Paste your own values here, replacing the placeholders:
  const firebaseConfig = {
    apiKey: "AIzaSyDlMhpoVldjMVS1uW_JVb6BOWzxrC3r7XM",
    authDomain: "tierlistwaifus.firebaseapp.com",
    databaseURL: "https://tierlistwaifus-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tierlistwaifus",
    storageBucket: "tierlistwaifus.firebasestorage.app",
    messagingSenderId: "521135132923",
    appId: "1:521135132923:web:ac24d00c625d812cede05e"
  
  };
  firebase.initializeApp(firebaseConfig);
  const dbRef = firebase.database().ref('collection');
  // ====== END FIREBASE SETUP ======

  let waifus = [];
  let currentStars = 0;
  let compareA = null, compareB = null;

  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));

  // Live-syncs from Firebase: fires on load AND whenever anyone (you or your friend) changes data
  function loadData(){
    dbRef.on('value', snapshot => {
      waifus = snapshot.val() || [];
      render();
    }, error => {
      console.error('Firebase read failed', error);
      alert('Could not connect to the shared database. Check your Firebase config and database rules.');
    });
  }

  function saveData(){
    return dbRef.set(waifus).catch(err=>{
      console.error('Firebase save failed', err);
      alert('Could not save to the shared database. Check your Firebase config and database rules.');
    });
  }

  function uid(){ return 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

  function placeholderImg(name){
    const initial = (name || '?').trim().charAt(0).toUpperCase() || '?';
    return null; // signal to use placeholder div instead of <img>
  }

  // ---------- TABS ----------
  $$('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      $$('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      $('#page-collection').classList.toggle('hidden', tab!=='collection');
      $('#page-tier').classList.toggle('hidden', tab!=='tier');
      $('#page-compare').classList.toggle('hidden', tab!=='compare');
      if(tab==='tier') renderTier();
      if(tab==='compare' && !compareA) newMatchup();
    });
  });

  // ---------- FILTER CONTROLS ----------
  let favOnly = false;
  $('#searchInput').addEventListener('input', renderGrid);
  $('#filterSeries').addEventListener('change', renderGrid);
  $('#filterTag').addEventListener('change', renderGrid);
  $('#sortSelect').addEventListener('change', renderGrid);
  $('#favOnlyBtn').addEventListener('click', ()=>{
    favOnly = !favOnly;
    $('#favOnlyBtn').classList.toggle('active', favOnly);
    renderGrid();
  });

  function populateFilterOptions(){
    const seriesSet = new Set(waifus.map(w=>w.series).filter(Boolean));
    const tagSet = new Set();
    waifus.forEach(w=>(w.tags||[]).forEach(t=>tagSet.add(t)));

    const seriesSel = $('#filterSeries');
    const curSeries = seriesSel.value;
    seriesSel.innerHTML = '<option value="">All series</option>' +
      Array.from(seriesSet).sort().map(s=>`<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`).join('');
    seriesSel.value = curSeries;

    const tagSel = $('#filterTag');
    const curTag = tagSel.value;
    tagSel.innerHTML = '<option value="">All tags</option>' +
      Array.from(tagSet).sort().map(t=>`<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join('');
    tagSel.value = curTag;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s){ return escapeHtml(s); }

  // ---------- RENDER GRID ----------
  function renderGrid(){
    populateFilterOptions();
    const q = $('#searchInput').value.trim().toLowerCase();
    const seriesF = $('#filterSeries').value;
    const tagF = $('#filterTag').value;
    const sortMode = $('#sortSelect').value;

    let list = waifus.filter(w=>{
      if(favOnly && !w.favorite) return false;
      if(seriesF && w.series !== seriesF) return false;
      if(tagF && !(w.tags||[]).includes(tagF)) return false;
      if(q){
        const hay = (w.name+' '+w.series).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });

    if(sortMode==='rating') list.sort((a,b)=>(b.rating||0)-(a.rating||0));
    else if(sortMode==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    else list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

    const grid = $('#cardGrid');
    if(list.length===0){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">${waifus.length===0 ? "Your binder is empty. Add your first character to begin." : "No characters match your filters."}</div>`;
      return;
    }

    grid.innerHTML = list.map(w=>{
      const stars = '★'.repeat(w.rating||0) + '☆'.repeat(5-(w.rating||0));
      const imgTag = w.image
        ? `<img class="card-img" src="${escapeAttr(w.image)}" alt="${escapeAttr(w.name)}" onerror="this.outerHTML='<div class=&quot;card-img placeholder&quot;>${(w.name||'?').charAt(0).toUpperCase()}</div>'">`
        : `<div class="card-img placeholder">${escapeHtml((w.name||'?').charAt(0).toUpperCase())}</div>`;
      const tier = w.tier && w.tier!=='Unranked' ? `<div class="tier-badge">${w.tier}</div>` : '';
      return `
      <div class="card" data-id="${w.id}">
        <div class="shine"></div>
        ${tier}
        <button class="pin-btn ${w.favorite?'is-fav':''}" data-id="${w.id}" data-action="pin">${w.favorite ? '★' : '☆'}</button>
        ${imgTag}
        <div class="card-body">
          <p class="card-name">${escapeHtml(w.name)}</p>
          <p class="card-series">${escapeHtml(w.series||'')}</p>
          <div class="card-stars">${stars}</div>
          <div class="tag-pills">${(w.tags||[]).slice(0,3).map(t=>`<span class="pill">${escapeHtml(t)}</span>`).join('')}</div>
        </div>
      </div>`;
    }).join('');

    $$('.pin-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const w = waifus.find(x=>x.id===btn.dataset.id);
        w.favorite = !w.favorite;
        saveData(); renderGrid();
      });
    });
    $$('.card').forEach(card=>{
      card.addEventListener('click', ()=> openDetail(card.dataset.id));
    });
  }

  // ---------- TAG SUGGESTIONS ----------
  const TAG_GROUPS = {
    'Personality': ['tsundere','kuudere','yandere','dandere','himedere','genki','shy','confident','airheaded','stoic','rebellious','clumsy','motherly','sadistic','loyal'],
    'Looks': ['redhead','blonde','blue hair','silver hair','twintails','ponytail','short hair','heterochromia','glasses','petite','tall'],
    'Role': ['mecha pilot','magical girl','swordswoman','mage','idol','student council','childhood friend','rival', 'princess','knight','assassin','healer'],
    'Vibe': ['comic relief','deuteragonist','main heroine','underrated','fan favorite','best girl candidate']
  };

  function buildTagPanel(){
    const panel = $('#tagSuggestPanel');
    panel.innerHTML = Object.entries(TAG_GROUPS).map(([group, tags])=>`
      <div class="tag-suggest-group">
        <div class="tag-suggest-heading">${escapeHtml(group)}</div>
        ${tags.map(t=>`<span class="tag-chip" data-tag="${escapeAttr(t)}">${escapeHtml(t)}</span>`).join('')}
      </div>
    `).join('');
    refreshChipState();
    panel.querySelectorAll('.tag-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        toggleTag(chip.dataset.tag);
        refreshChipState();
      });
    });
  }

  function currentTagList(){
    return $('#fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  }

  function toggleTag(tag){
    let tags = currentTagList();
    const idx = tags.findIndex(t=>t.toLowerCase()===tag.toLowerCase());
    if(idx>=0) tags.splice(idx,1);
    else tags.push(tag);
    $('#fTags').value = tags.join(', ');
  }

  function refreshChipState(){
    const tags = currentTagList().map(t=>t.toLowerCase());
    $('#tagSuggestPanel').querySelectorAll('.tag-chip').forEach(chip=>{
      chip.classList.toggle('added', tags.includes(chip.dataset.tag.toLowerCase()));
    });
  }

  $('#suggestTagsBtn').addEventListener('click', ()=>{
    const panel = $('#tagSuggestPanel');
    if(panel.classList.contains('hidden')){
      buildTagPanel();
      panel.classList.remove('hidden');
    } else {
      panel.classList.add('hidden');
    }
  });

  // ---------- ADD/EDIT FORM ----------
  function setStars(n){
    currentStars = n;
    $$('#starInput span').forEach(s=>{
      s.classList.toggle('filled', parseInt(s.dataset.v) <= n);
    });
  }
  $$('#starInput span').forEach(s=>{
    s.addEventListener('click', ()=> setStars(parseInt(s.dataset.v)));
  });

  function openAddForm(){
    $('#formTitle').textContent = 'Add character';
    $('#editId').value = '';
    $('#fName').value = '';
    $('#fSeries').value = '';
    $('#fSource').value = 'Anime';
    $('#fImage').value = '';
    $('#fTags').value = '';
    $('#fNotes').value = '';
    setStars(0);
    $('#deleteBtn').style.display = 'none';
    $('#tagSuggestPanel').classList.add('hidden');
    $('#formModalOverlay').classList.remove('hidden');
  }

  function openEditForm(id){
    const w = waifus.find(x=>x.id===id);
    if(!w) return;
    $('#formTitle').textContent = 'Edit character';
    $('#editId').value = w.id;
    $('#fName').value = w.name||'';
    $('#fSeries').value = w.series||'';
    $('#fSource').value = w.source||'Anime';
    $('#fImage').value = w.image||'';
    $('#fTags').value = (w.tags||[]).join(', ');
    $('#fNotes').value = w.notes||'';
    setStars(w.rating||0);
    $('#deleteBtn').style.display = 'inline-block';
    $('#tagSuggestPanel').classList.add('hidden');
    $('#formModalOverlay').classList.remove('hidden');
    $('#detailModalOverlay').classList.add('hidden');
  }

  $('#openAddBtn').addEventListener('click', openAddForm);
  $('#formCloseBtn').addEventListener('click', ()=> $('#formModalOverlay').classList.add('hidden'));
  $('#cancelFormBtn').addEventListener('click', ()=> $('#formModalOverlay').classList.add('hidden'));

  $('#saveBtn').addEventListener('click', async ()=>{
    const name = $('#fName').value.trim();
    if(!name){ alert('Please enter a name.'); return; }
    const id = $('#editId').value;
    const tags = $('#fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const data = {
      name,
      series: $('#fSeries').value.trim(),
      source: $('#fSource').value,
      image: $('#fImage').value.trim(),
      tags,
      rating: currentStars,
      notes: $('#fNotes').value.trim()
    };
    if(id){
      const w = waifus.find(x=>x.id===id);
      Object.assign(w, data);
    } else {
      waifus.push(Object.assign({
        id: uid(),
        createdAt: Date.now(),
        favorite:false,
        tier:'Unranked',
        wins:0, losses:0
      }, data));
    }
    await saveData();
    $('#formModalOverlay').classList.add('hidden');
    renderGrid();
  });

  $('#deleteBtn').addEventListener('click', async ()=>{
    const id = $('#editId').value;
    if(!id) return;
    if(!confirm('Remove this character from your collection?')) return;
    waifus = waifus.filter(x=>x.id!==id);
    await saveData();
    $('#formModalOverlay').classList.add('hidden');
    renderGrid();
  });

  // ---------- DETAIL MODAL ----------
  let detailId = null;
  function openDetail(id){
    const w = waifus.find(x=>x.id===id);
    if(!w) return;
    detailId = id;
    $('#dImage').src = w.image || '';
    $('#dImage').style.display = w.image ? 'block' : 'none';
    $('#dName').textContent = w.name;
    $('#dSeries').textContent = (w.series||'') + (w.source ? ' · '+w.source : '');
    $('#dStars').textContent = '★'.repeat(w.rating||0) + '☆'.repeat(5-(w.rating||0));
    $('#dTags').innerHTML = (w.tags||[]).map(t=>`<span class="pill">${escapeHtml(t)}</span>`).join('');
    $('#dNotes').textContent = w.notes || 'No notes yet.';
    $('#detailModalOverlay').classList.remove('hidden');
  }
  $('#detailCloseBtn').addEventListener('click', ()=> $('#detailModalOverlay').classList.add('hidden'));
  $('#editFromDetailBtn').addEventListener('click', ()=> openEditForm(detailId));

  [$('#formModalOverlay'), $('#detailModalOverlay'), $('#spotlightOverlay')].forEach(ov=>{
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.add('hidden'); });
  });

  // ---------- TIER LIST ----------
  const TIERS = ['S','A','B','C','Unranked'];
  function renderTier(){
    const container = $('#tierContainer');
    container.innerHTML = TIERS.map(t=>`
      <div class="tier-row tier-${t}">
        <div class="tier-label">${t}</div>
        <div class="tier-body" data-tier="${t}"></div>
      </div>
    `).join('');

    waifus.forEach(w=>{
      const tier = TIERS.includes(w.tier) ? w.tier : 'Unranked';
      const body = container.querySelector(`.tier-body[data-tier="${tier}"]`);
      const el = document.createElement('div');
      el.className = 'mini-card';
      el.draggable = true;
      el.dataset.id = w.id;
      const img = w.image
        ? `<img src="${escapeAttr(w.image)}" onerror="this.style.background='#ccc'">`
        : `<div style="width:64px;height:84px;background:var(--page-cream);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);color:#999;">${escapeHtml((w.name||'?').charAt(0))}</div>`;
      el.innerHTML = `${img}<div class="mini-name">${escapeHtml(w.name)}</div>`;
      el.addEventListener('dragstart', e=>{
        e.dataTransfer.setData('text/plain', w.id);
      });
      body.appendChild(el);
    });

    container.querySelectorAll('.tier-body').forEach(body=>{
      body.addEventListener('dragover', e=>{ e.preventDefault(); body.classList.add('dragover'); });
      body.addEventListener('dragleave', ()=> body.classList.remove('dragover'));
      body.addEventListener('drop', async e=>{
        e.preventDefault();
        body.classList.remove('dragover');
        const id = e.dataTransfer.getData('text/plain');
        const w = waifus.find(x=>x.id===id);
        if(w){
          w.tier = body.dataset.tier;
          await saveData();
          renderTier();
        }
      });
    });
  }

  // ---------- COMPARE ----------
  $('#newMatchupBtn').addEventListener('click', newMatchup);
  function newMatchup(){
    if(waifus.length < 2){
      $('#compareWrap').innerHTML = `<div class="empty-state">Add at least two characters to start comparing.</div>`;
      return;
    }
    let a, b;
    do{
      a = waifus[Math.floor(Math.random()*waifus.length)];
      b = waifus[Math.floor(Math.random()*waifus.length)];
    } while(a.id===b.id);
    compareA = a; compareB = b;
    renderCompare();
  }
  function renderCompare(){
    if(!compareA || !compareB) return;
    const wrap = $('#compareWrap');
    const card = (w, side) => {
      const img = w.image
        ? `<img src="${escapeAttr(w.image)}" onerror="this.style.background='#ddd'">`
        : `<div style="width:100%;aspect-ratio:3/4;background:var(--page-cream-2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:2.5rem;color:#999;">${escapeHtml((w.name||'?').charAt(0))}</div>`;
      return `
      <div class="compare-card" data-side="${side}">
        ${img}
        <p class="compare-name">${escapeHtml(w.name)}</p>
        <p class="compare-score">${w.wins||0} wins</p>
        <button class="btn btn-rose" data-vote="${side}">Vote</button>
      </div>`;
    };
    wrap.innerHTML = card(compareA,'a') + '<div class="compare-vs">vs</div>' + card(compareB,'b');
    wrap.querySelectorAll('[data-vote]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const winner = btn.dataset.vote==='a' ? compareA : compareB;
        const loser = btn.dataset.vote==='a' ? compareB : compareA;
        winner.wins = (winner.wins||0)+1;
        loser.losses = (loser.losses||0)+1;
        await saveData();
        newMatchup();
      });
    });
  }

  // ---------- RANDOM SPOTLIGHT ----------
  $('#randomBtn').addEventListener('click', ()=>{
    if(waifus.length===0){ alert('Add a character first!'); return; }
    const w = waifus[Math.floor(Math.random()*waifus.length)];
    $('#spotlightImg').src = w.image || '';
    $('#spotlightImg').style.display = w.image ? 'block' : 'none';
    $('#spotlightName').textContent = w.name;
    $('#spotlightSeries').textContent = w.series||'';
    $('#spotlightOverlay').classList.remove('hidden');
  });
  $('#spotlightCloseBtn').addEventListener('click', ()=> $('#spotlightOverlay').classList.add('hidden'));

  function render(){
    renderGrid();
  }

  loadData();
})();
</script>
</body>
</html>
